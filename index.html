<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mit's MJT</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 0;
}

.fixed-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 999;
  background: white;
  border-bottom: 1px solid #ddd;
  padding: 4px 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
}

.title {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  line-height: 1.1;
}

.subtitle {
  text-align: center;
  font-size: 12px;
  color: #666;
}

.counter {
  text-align: center;
  font-size: 14px;
  margin-top: 4px;
}

.mode-buttons,
.actions {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 6px;
}

.mode-button,
.action-button {
  border: none;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 14px;
  background: #ddd;
  color: #000;
}

.mode-button.active {
  background: #222;
  color: white;
}

.start-button.enabled {
  background: #222;
  color: white;
}

.start-button.disabled {
  background: #bbb;
  color: #666;
}

.undo-button {
  background: #0057b8;
  color: white;
}

.undo-button.hidden {
  display: none;
}

.suggestion {
  text-align: center;
  font-size: 13px;
  font-weight: bold;
  margin-top: 4px;
}

.tip {
  text-align: center;
  font-size: 12px;
  color: #666;
  margin-top: 5px;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 130px 8px 20px;
  background: white;
}

.section {
  margin-top: 10px;
}

.section h2 {
  margin: 4px 0;
  font-size: 18px;
}

.tile-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.honor-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}

.tile {
  background: #e9e9e9;
  border-radius: 10px;
  text-align: center;
  padding: 10px 4px;
  user-select: none;
}

.tile.selected {
  background: #fff3a3;
}

.tile-name {
  font-size: 16px;
  font-weight: bold;
  color: black;
}

.tile-count {
  height: 20px;
  font-size: 18px;
  margin-top: 3px;
  color: #0047ab;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="fixed-header">
  <div class="title">Mit's MJT</div>
  <div class="subtitle">(6BT v1.6)</div>

  <div class="counter">
    Tiles Entered: <span id="total">0</span> / <span id="target">16</span>
  </div>

  <div class="mode-buttons">
    <button id="playerBtn" class="mode-button active" onclick="setMode('player')">Player</button>
    <button id="dealerBtn" class="mode-button" onclick="setMode('dealer')">Dealer</button>
  </div>

  <div id="suggestion" class="suggestion">Need 16 more tile(s).</div>

  <div class="actions">
    <button class="action-button" onclick="clearAll()">Clear All</button>
    <button id="startBtn" class="action-button start-button disabled" onclick="startHand()" disabled>Start</button>
    <button id="undoBtn" class="action-button undo-button hidden" onclick="undoClear()">Undo</button>
  </div>

  <div class="tip">Long press tile to clear it.</div>
</div>

<div class="container">

  <div class="section">
    <h2>Chars (<span id="charsTotal">0</span>)</h2>
    <div class="tile-grid" id="characters"></div>
  </div>

  <div class="section">
    <h2>Bams (<span id="bamsTotal">0</span>)</h2>
    <div class="tile-grid" id="bams"></div>
  </div>

  <div class="section">
    <h2>Dots (<span id="dotsTotal">0</span>)</h2>
    <div class="tile-grid" id="dots"></div>
  </div>

  <div class="section">
    <h2>Winds (<span id="windsTotal">0</span>)</h2>
    <div class="honor-grid" id="winds"></div>
  </div>

  <div class="section">
    <h2>Dragons (<span id="dragonsTotal">0</span>)</h2>
    <div class="honor-grid" id="dragons"></div>
  </div>

</div>

<script>
const counts = {};
let mode = "player";
let undoSnapshot = null;
let longPressTimer = null;
let longPressTriggered = false;

function getTarget() {
  return mode === "dealer" ? 17 : 16;
}

function getTotal() {
  let total = 0;
  for (const key in counts) total += counts[key];
  return total;
}

function saveUndoSnapshot() {
  undoSnapshot = {
    counts: { ...counts },
    mode: mode
  };
}

function showUndo() {
  document.getElementById("undoBtn").classList.remove("hidden");
}

function hideUndo() {
  document.getElementById("undoBtn").classList.add("hidden");
}

function createTile(containerId, label, key) {
  counts[key] = 0;

  const tile = document.createElement("div");
  tile.className = "tile";
  tile.id = "tile-" + key;

  tile.addEventListener("click", function () {
    if (longPressTriggered) {
      longPressTriggered = false;
      return;
    }

    const total = getTotal();
    const target = getTarget();

    if (counts[key] === 0 && total >= target) {
      updateDisplay("Maximum tiles selected.");
      return;
    }

    counts[key] = (counts[key] + 1) % 5;
    hideUndo();
    updateDisplay();
  });

  tile.addEventListener("touchstart", function () {
    longPressTriggered = false;
    longPressTimer = setTimeout(function () {
      counts[key] = 0;
      longPressTriggered = true;
      hideUndo();
      updateDisplay();
    }, 650);
  });

  tile.addEventListener("touchend", function () {
    clearTimeout(longPressTimer);
  });

  tile.addEventListener("touchmove", function () {
    clearTimeout(longPressTimer);
  });

  tile.addEventListener("mousedown", function () {
    longPressTriggered = false;
    longPressTimer = setTimeout(function () {
      counts[key] = 0;
      longPressTriggered = true;
      hideUndo();
      updateDisplay();
    }, 650);
  });

  tile.addEventListener("mouseup", function () {
    clearTimeout(longPressTimer);
  });

  tile.addEventListener("mouseleave", function () {
    clearTimeout(longPressTimer);
  });

  tile.innerHTML =
    '<div class="tile-name">' + label + '</div>' +
    '<div class="tile-count" id="count-' + key + '"></div>';

  document.getElementById(containerId).appendChild(tile);
}

function buildTiles() {
  for (let i = 1; i <= 9; i++) createTile("characters", i + " Char", "char" + i);
  for (let i = 1; i <= 9; i++) createTile("bams", i + " Bam", "bam" + i);
  for (let i = 1; i <= 9; i++) createTile("dots", i + " Dot", "dot" + i);

  createTile("winds", "East", "east");
  createTile("winds", "South", "south");
  createTile("winds", "West", "west");
  createTile("winds", "North", "north");

  createTile("dragons", "Red", "red");
  createTile("dragons", "Green", "green");
  createTile("dragons", "White", "white");
}

function setMode(newMode) {
  mode = newMode;
  document.getElementById("playerBtn").classList.toggle("active", mode === "player");
  document.getElementById("dealerBtn").classList.toggle("active", mode === "dealer");
  hideUndo();
  updateDisplay();
}

function updateDisplay(customMessage) {
  let total = 0;
  let chars = 0;
  let bams = 0;
  let dots = 0;
  let winds = 0;
  let dragons = 0;

  for (const key in counts) {
    const value = counts[key];
    total += value;

    document.getElementById("count-" + key).textContent = value === 0 ? "" : value;
    document.getElementById("tile-" + key).classList.toggle("selected", value > 0);

    if (key.startsWith("char")) chars += value;
    else if (key.startsWith("bam")) bams += value;
    else if (key.startsWith("dot")) dots += value;
    else if (["east", "south", "west", "north"].includes(key)) winds += value;
    else dragons += value;
  }

  const target = getTarget();

  document.getElementById("total").textContent = total;
  document.getElementById("target").textContent = target;

  document.getElementById("charsTotal").textContent = chars;
  document.getElementById("bamsTotal").textContent = bams;
  document.getElementById("dotsTotal").textContent = dots;
  document.getElementById("windsTotal").textContent = winds;
  document.getElementById("dragonsTotal").textContent = dragons;

  const startBtn = document.getElementById("startBtn");
  if (total === target) {
    startBtn.disabled = false;
    startBtn.classList.remove("disabled");
    startBtn.classList.add("enabled");
  } else {
    startBtn.disabled = true;
    startBtn.classList.remove("enabled");
    startBtn.classList.add("disabled");
  }

  const suggestion = document.getElementById("suggestion");

  if (customMessage) {
    suggestion.textContent = customMessage;
  } else if (total < target) {
    suggestion.textContent = "Need " + (target - total) + " more tile(s).";
  } else if (total === target) {
    suggestion.textContent = "Hand complete. Press Start.";
  }
}

function clearAll() {
  if (getTotal() === 0) return;

  saveUndoSnapshot();

  for (const key in counts) counts[key] = 0;

  showUndo();
  updateDisplay("Hand cleared.");
}

function undoClear() {
  if (!undoSnapshot) return;

  mode = undoSnapshot.mode;

  for (const key in undoSnapshot.counts) {
    counts[key] = undoSnapshot.counts[key];
  }

  document.getElementById("playerBtn").classList.toggle("active", mode === "player");
  document.getElementById("dealerBtn").classList.toggle("active", mode === "dealer");

  hideUndo();
  updateDisplay("Hand restored.");
}

function startHand() {
  if (getTotal() !== getTarget()) return;
  updateDisplay("Start pressed. HD screen coming later.");
}

buildTiles();
updateDisplay();
</script>

</body>
</html>
