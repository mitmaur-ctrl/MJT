
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mit's MJT</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 10px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 14px;
  border-radius: 12px;
}

.title {
  text-align: center;
  font-size: 34px;
  font-weight: bold;
}

.subtitle {
  text-align: center;
  font-size: 18px;
  margin-bottom: 8px;
}

.counter {
  text-align: center;
  font-size: 18px;
  margin-bottom: 12px;
}

.section {
  margin-top: 12px;
}

.section h2 {
  margin: 6px 0;
  font-size: 22px;
}

.tile-grid {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 6px;
}

.honor-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.tile {
  background: #e9e9e9;
  border-radius: 10px;
  padding: 6px 2px;
  text-align: center;
  font-weight: bold;
  cursor: pointer;
  user-select: none;
}

.tile-name {
  font-size: 18px;
}

.tile-count {
  height: 20px;
  font-size: 18px;
  margin-top: 2px;
}

.actions {
  margin-top: 14px;
  display: flex;
  gap: 10px;
  justify-content: center;
}

button {
  font-size: 18px;
  padding: 10px 18px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
}

@media (orientation: landscape) {
  .title {
    font-size: 28px;
  }

  .subtitle,
  .counter {
    font-size: 16px;
  }

  .section h2 {
    font-size: 20px;
  }

  .tile-name,
  .tile-count {
    font-size: 16px;
  }

  .tile {
    padding: 5px 2px;
  }
}
</style>
</head>

<body>
<div class="container">
  <div class="title">Mit's MJT</div>
  <div class="subtitle">(6BT v1.1)</div>
  <div class="counter">Tiles Entered: <span id="total">0</span> / 13</div>

  <div class="section">
    <h2>Characters</h2>
    <div class="tile-grid" id="characters"></div>
  </div>

  <div class="section">
    <h2>Bams</h2>
    <div class="tile-grid" id="bams"></div>
  </div>

  <div class="section">
    <h2>Dots</h2>
    <div class="tile-grid" id="dots"></div>
  </div>

  <div class="section">
    <h2>Winds</h2>
    <div class="honor-grid" id="winds"></div>
  </div>

  <div class="section">
    <h2>Dragons</h2>
    <div class="honor-grid" id="dragons"></div>
  </div>

  <div class="actions">
    <button onclick="clearHand()">Clear Hand</button>
  </div>
</div>

<script>
const counts = {};

function createTile(containerId, label, key) {
  counts[key] = 0;

  const tile = document.createElement("div");
  tile.className = "tile";
  tile.onclick = function () {
    counts[key] = (counts[key] + 1) % 5;
    updateDisplay();
  };

  tile.innerHTML = `
    <div class="tile-name">${label}</div>
    <div class="tile-count" id="count-${key}"></div>
  `;

  document.getElementById(containerId).appendChild(tile);
}

function buildTiles() {
  for (let i = 1; i <= 9; i++) {
    createTile("characters", i + " Char", "char" + i);
  }

  for (let i = 1; i <= 9; i++) {
    createTile("bams", i + " Bam", "bam" + i);
  }

  for (let i = 1; i <= 9; i++) {
    createTile("dots", i + " Dot", "dot" + i);
  }

  createTile("winds", "East", "east");
  createTile("winds", "South", "south");
  createTile("winds", "West", "west");
  createTile("winds", "North", "north");

  createTile("dragons", "Red", "red");
  createTile("dragons", "Green", "green");
  createTile("dragons", "White", "white");
}

function updateDisplay() {
  let total = 0;

  for (const key in counts) {
    total += counts[key];
    document.getElementById("count-" + key).textContent =
      counts[key] === 0 ? "" : counts[key];
  }

  document.getElementById("total").textContent = total;
}

function clearHand() {
  for (const key in counts) {
    counts[key] = 0;
  }
  updateDisplay();
}

buildTiles();
updateDisplay();
</script>
</body>
</html>
