<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJT - Mahjong Tutor</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

h1{
    text-align:center;
}

.section{
    margin-top:20px;
}

.tile-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.tile-row label{
    font-weight:bold;
}

select{
    width:70px;
    padding:5px;
}

button{
    width:100%;
    padding:15px;
    font-size:18px;
    margin-top:20px;
}

#output{
    margin-top:20px;
    padding:15px;
    background:#eef;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>MJT - Mahjong Tutor</h1>

<p>Record your starting hand.</p>

<div class="section">

<h2>Dots</h2>

<div class="tile-row"><label>1 Dot</label><select id="d1"></select></div>
<div class="tile-row"><label>2 Dot</label><select id="d2"></select></div>
<div class="tile-row"><label>3 Dot</label><select id="d3"></select></div>
<div class="tile-row"><label>4 Dot</label><select id="d4"></select></div>
<div class="tile-row"><label>5 Dot</label><select id="d5"></select></div>
<div class="tile-row"><label>6 Dot</label><select id="d6"></select></div>
<div class="tile-row"><label>7 Dot</label><select id="d7"></select></div>
<div class="tile-row"><label>8 Dot</label><select id="d8"></select></div>
<div class="tile-row"><label>9 Dot</label><select id="d9"></select></div>

</div>

<div class="section">

<h2>Bamboo</h2>

<div class="tile-row"><label>1 Bam</label><select id="b1"></select></div>
<div class="tile-row"><label>2 Bam</label><select id="b2"></select></div>
<div class="tile-row"><label>3 Bam</label><select id="b3"></select></div>
<div class="tile-row"><label>4 Bam</label><select id="b4"></select></div>
<div class="tile-row"><label>5 Bam</label><select id="b5"></select></div>
<div class="tile-row"><label>6 Bam</label><select id="b6"></select></div>
<div class="tile-row"><label>7 Bam</label><select id="b7"></select></div>
<div class="tile-row"><label>8 Bam</label><select id="b8"></select></div>
<div class="tile-row"><label>9 Bam</label><select id="b9"></select></div>

</div>

<div class="section">

<h2>Characters</h2>

<div class="tile-row"><label>1 Crak</label><select id="c1"></select></div>
<div class="tile-row"><label>2 Crak</label><select id="c2"></select></div>
<div class="tile-row"><label>3 Crak</label><select id="c3"></select></div>
<div class="tile-row"><label>4 Crak</label><select id="c4"></select></div>
<div class="tile-row"><label>5 Crak</label><select id="c5"></select></div>
<div class="tile-row"><label>6 Crak</label><select id="c6"></select></div>
<div class="tile-row"><label>7 Crak</label><select id="c7"></select></div>
<div class="tile-row"><label>8 Crak</label><select id="c8"></select></div>
<div class="tile-row"><label>9 Crak</label><select id="c9"></select></div>

</div>

<div class="section">

<h2>Winds</h2>

<div class="tile-row"><label>East</label><select id="east"></select></div>
<div class="tile-row"><label>South</label><select id="south"></select></div>
<div class="tile-row"><label>West</label><select id="west"></select></div>
<div class="tile-row"><label>North</label><select id="north"></select></div>

</div>

<div class="section">

<h2>Dragons</h2>

<div class="tile-row"><label>Red</label><select id="red"></select></div>
<div class="tile-row"><label>Green</label><select id="green"></select></div>
<div class="tile-row"><label>White</label><select id="white"></select></div>

</div>

<button onclick="showHand()">Show My Hand</button>

<div id="output"></div>

</div>

<script>

const selects = document.querySelectorAll("select");

selects.forEach(select => {
    for(let i=0;i<=4;i++){
        let option = document.createElement("option");
        option.value = i;
        option.text = i;
        select.appendChild(option);
    }
});

function showHand(){

    let total = 0;

    selects.forEach(select=>{
        total += parseInt(select.value);
    });

    document.getElementById("output").innerHTML =
        "<h3>Total Tiles Entered: " + total + "</h3>";
}

</script>

</body>
</html>
