
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mit's MJT</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 0;
}

.fixed-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 999;
  background: white;
  border-bottom: 1px solid #ddd;
  padding: 4px 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
}

.title {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  line-height: 1.1;
}

.subtitle {
  text-align: center;
  font-size: 12px;
  color: #666;
}

.counter {
  text-align: center;
  font-size: 14px;
  margin-top: 4px;
}

.mode-buttons {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 4px;
}

.mode-button {
  border: none;
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 14px;
  background: #ddd;
}

.mode-button.active {
  background: #222;
  color: white;
}

.suggestion {
  text-align: center;
  font-size: 13px;
  font-weight: bold;
  margin-top: 4px;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 115px 8px 20px;
  background: white;
}

.section {
  margin-top: 10px;
}

.section h2 {
  margin: 4px 0;
  font-size: 18px;
}

.tile-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.honor-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}

.tile {
  background: #e9e9e9;
  border-radius: 10px;
  text-align: center;
  padding: 10px 4px;
  user-select: none;
}

.tile-name {
  font-size: 16px;
  font-weight: bold;
}

.tile-count {
  height: 20px;
  font-size: 18px;
  margin-top: 3px;
}

.actions {
  display: flex;
  justify-content: center;
  margin-top: 15px;
}

.clear-button {
  border: none;
  border-radius: 10px;
  background: #222;
  color: white;
  padding: 10px 18px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="fixed-header">
  <div class="title">Mit's MJT</div>
  <div class="subtitle">(6BT v1.5)</div>

  <div class="counter">
    Tiles Entered: <span id="total">0</span> / <span id="target">16</span>
  </div>

  <div class="mode-buttons">
    <button id="playerBtn" class="mode-button active" onclick="setMode('player')">Player</button>
    <button id="dealerBtn" class="mode-button" onclick="setMode('dealer')">Dealer</button>
  </div>

  <div id="suggestion" class="suggestion">Need 16 more tile(s).</div>
</div>

<div class="container">

  <div class="section">
    <h2>Characters</h2>
    <div class="tile-grid" id="characters"></div>
  </div>

  <div class="section">
    <h2>Bams</h2>
    <div class="tile-grid" id="bams"></div>
  </div>

  <div class="section">
    <h2>Dots</h2>
    <div class="tile-grid" id="dots"></div>
  </div>

  <div class="section">
    <h2>Winds</h2>
    <div class="honor-grid" id="winds"></div>
  </div>

  <div class="section">
    <h2>Dragons</h2>
    <div class="honor-grid" id="dragons"></div>
  </div>

  <div class="actions">
    <button class="clear-button" onclick="clearHand()">Clear Hand</button>
  </div>

</div>

<script>
const counts = {};
let mode = "player";

function createTile(containerId, label, key) {
  counts[key] = 0;

  const tile = document.createElement("div");
  tile.className = "tile";

  tile.onclick = function () {
    counts[key] = (counts[key] + 1) % 5;
    updateDisplay();
  };

  tile.innerHTML =
    '<div class="tile-name">' + label + '</div>' +
    '<div class="tile-count" id="count-' + key + '"></div>';

  document.getElementById(containerId).appendChild(tile);
}

function buildTiles() {
  for (let i = 1; i <= 9; i++) {
    createTile("characters", i + " Char", "char" + i);
  }

  for (let i = 1; i <= 9; i++) {
    createTile("bams", i + " Bam", "bam" + i);
  }

  for (let i = 1; i <= 9; i++) {
    createTile("dots", i + " Dot", "dot" + i);
  }

  createTile("winds", "East", "east");
  createTile("winds", "South", "south");
  createTile("winds", "West", "west");
  createTile("winds", "North", "north");

  createTile("dragons", "Red", "red");
  createTile("dragons", "Green", "green");
  createTile("dragons", "White", "white");
}

function setMode(newMode) {
  mode = newMode;

  document.getElementById("playerBtn").classList.toggle("active", mode === "player");
  document.getElementById("dealerBtn").classList.toggle("active", mode === "dealer");

  updateDisplay();
}

function updateDisplay() {
  let total = 0;

  for (const key in counts) {
    total += counts[key];
    document.getElementById("count-" + key).textContent =
      counts[key] === 0 ? "" : counts[key];
  }

  const target = mode === "dealer" ? 17 : 16;

  document.getElementById("total").textContent = total;
  document.getElementById("target").textContent = target;

  const suggestion = document.getElementById("suggestion");

  if (total < target) {
    suggestion.textContent = "Need " + (target - total) + " more tile(s).";
  } else if (total > target) {
    suggestion.textContent = "Too many tiles by " + (total - target) + ".";
  } else if (mode === "dealer") {
    suggestion.textContent = "Dealer hand ready.";
  } else {
    suggestion.textContent = "Starting hand ready.";
  }
}

function clearHand() {
  for (const key in counts) {
    counts[key] = 0;
  }

  updateDisplay();
}

buildTiles();
updateDisplay();
</script>

</body>
</html>
